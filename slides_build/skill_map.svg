<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" style="background:#ffffff">
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="32" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">한 문항을 푸는 데 필요한 역량들</text>
  <text x="150" y="58" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">수능 문항 (예시 3개)</text>
  <text x="865" y="58" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">필요한 역량 (7개)</text>

  <!-- Connection lines (drawn first, behind cards/nodes) -->
  <!-- A(주제파악, y=145) -->
  <path d="M 280,145 C 480,145 580,68 750,68" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,145 C 480,145 580,143 750,143" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,145 C 480,145 580,218 750,218" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>
  <path d="M 280,145 C 480,145 580,368 750,368" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>

  <!-- B(빈칸추론, y=315) -->
  <path d="M 280,315 C 480,315 580,68 750,68" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,315 C 480,315 580,143 750,143" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,315 C 480,315 580,218 750,218" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>
  <path d="M 280,315 C 480,315 580,293 750,293" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>
  <path d="M 280,315 C 480,315 580,368 750,368" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 280,315 C 480,315 580,443 750,443" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>

  <!-- C(글의 순서, y=485) -->
  <path d="M 280,485 C 480,485 580,68 750,68" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,485 C 480,485 580,143 750,143" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 280,485 C 480,485 580,218 750,218" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 280,485 C 480,485 580,293 750,293" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>
  <path d="M 280,485 C 480,485 580,518 750,518" stroke="#FF3B30" stroke-width="3.5" fill="none" opacity="0.85"/>

  <!-- Question Cards (left) -->
  <g>
    <rect x="20" y="75" width="260" height="140" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <path d="M 20,85 L 20,107 L 280,107 L 280,85 Q 280,75 270,75 L 30,75 Q 20,75 20,85 Z" fill="#0f172a"/>
    <text x="150" y="97" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">A. 주제파악</text>
    <text x="150" y="135" font-size="14" fill="#0f172a" text-anchor="middle">글 전체의 핵심 메시지를</text>
    <text x="150" y="156" font-size="14" fill="#0f172a" text-anchor="middle">한 문장으로 추리기</text>
    <text x="150" y="195" font-size="11" fill="#64748b" text-anchor="middle">「다음 글의 주제로 적절한 것은?」</text>
  </g>
  <g>
    <rect x="20" y="245" width="260" height="140" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <path d="M 20,255 L 20,277 L 280,277 L 280,255 Q 280,245 270,245 L 30,245 Q 20,245 20,255 Z" fill="#0f172a"/>
    <text x="150" y="267" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">B. 빈칸추론</text>
    <text x="150" y="305" font-size="14" fill="#0f172a" text-anchor="middle">지문 속 빠진 표현을</text>
    <text x="150" y="326" font-size="14" fill="#0f172a" text-anchor="middle">맥락으로 채우기</text>
    <text x="150" y="365" font-size="11" fill="#64748b" text-anchor="middle">「빈칸에 들어갈 말로 적절한 것은?」</text>
  </g>
  <g>
    <rect x="20" y="415" width="260" height="140" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <path d="M 20,425 L 20,447 L 280,447 L 280,425 Q 280,415 270,415 L 30,415 Q 20,415 20,425 Z" fill="#0f172a"/>
    <text x="150" y="437" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">C. 글의 순서</text>
    <text x="150" y="475" font-size="14" fill="#0f172a" text-anchor="middle">주어진 글 뒤로 이어질</text>
    <text x="150" y="496" font-size="14" fill="#0f172a" text-anchor="middle">문장의 순서 맞추기</text>
    <text x="150" y="535" font-size="11" fill="#64748b" text-anchor="middle">「주어진 글에 이어질 순서는?」</text>
  </g>

  <!-- Skill Nodes (right) -->
  <g>
    <rect x="750" y="47" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="73" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">1. 단어 뜻 알기</text>
  </g>
  <g>
    <rect x="750" y="122" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="148" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">2. 문장 뼈대 잡기</text>
  </g>
  <g>
    <rect x="750" y="197" width="230" height="42" rx="21" fill="#FFE8E6" stroke="#FF3B30" stroke-width="2"/>
    <text x="865" y="223" font-size="14" font-weight="700" fill="#FF3B30" text-anchor="middle">★ 3. 같은 말 다르게 알아보기</text>
  </g>
  <g>
    <rect x="750" y="272" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="298" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">4. 앞뒤 잇기 (인과·대조)</text>
  </g>
  <g>
    <rect x="750" y="347" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="373" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">5. 글의 줄기 보기</text>
  </g>
  <g>
    <rect x="750" y="422" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="448" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">6. 빠진 곳 채우기</text>
  </g>
  <g>
    <rect x="750" y="497" width="230" height="42" rx="21" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1"/>
    <text x="865" y="523" font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">7. 흐름 맞추기</text>
  </g>

  <!-- Legend -->
  <g transform="translate(310, 580)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#FF3B30" stroke-width="3.5"/>
    <text x="40" y="5" font-size="12" fill="#0f172a">핵심 역량 (Primary)</text>
    <line x1="180" y1="0" x2="212" y2="0" stroke="#2563eb" stroke-width="2.5"/>
    <text x="220" y="5" font-size="12" fill="#0f172a">보조 역량 (Secondary)</text>
    <line x1="370" y1="0" x2="402" y2="0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="410" y="5" font-size="12" fill="#0f172a">기본 입력 처리</text>
  </g>
</svg>
