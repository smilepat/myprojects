## 원인

# 시험은 결과만 본다.
# <span class="red">12년의 흔적</span>은
# 본 적이 없다.

<br>

- **스냅샷 평가** — 그 순간만 측정, 사이의 흐름은 사라진다
- **늦은 발견** — 학기말에 알면 이미 다음 단원
- **같은 처방** — 30명 같은 교재, 다른 환자에 같은 약

<br>

<span class="muted">격차는 측정 안 했기 때문에 못 막는다.</span>

<script>
  // Self-contained — zero CDN. Hardcoded CSS in <head>, simple renderer here.
  function renderInline(t) {
    t = t.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
    return t;
  }
  function renderMd(src) {
    src = src.replace(/<!--[\s\S]*?-->/g, '');
    src = src.replace(/((?:^[ \t]*\|.+\|[ \t]*\r?\n?){2,})/gm, function (block) {
      var lines = block.replace(/\r?\n+$/, '').split(/\r?\n/);
      if (lines.length < 2 || !/^[ \t]*\|[\s|:\-]+\|[ \t]*$/.test(lines[1])) return block;
      var parse = function (l) { return l.trim().slice(1, -1).split('|').map(function (c) { return c.trim(); }); };
      var head = parse(lines[0]);
      var rows = lines.slice(2).map(parse);
      var html = '<table><thead><tr>';
      head.forEach(function (h) { html += '<th>' + renderInline(h) + '</th>'; });
      html += '</tr></thead><tbody>';
      rows.forEach(function (r) {
        html += '<tr>';
        r.forEach(function (c) { html += '<td>' + renderInline(c) + '</td>'; });
        html += '</tr>';
      });
      return html + '</tbody></table>';
    });
    src = src.replace(/^(#{1,6})[ \t]+(.+)$/gm, function (_, h, t) {
      return '<h' + h.length + '>' + renderInline(t) + '</h' + h.length + '>';
    });
    src = src.replace(/((?:^[ \t]*\d+\.[ \t]+.+(?:\r?\n|$))+)/gm, function (b) {
      var items = b.trim().split(/\r?\n/).map(function (l) {
        return '<li>' + renderInline(l.replace(/^[ \t]*\d+\.[ \t]+/, '')) + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    src = src.replace(/((?:^[ \t]*-[ \t]+.+(?:\r?\n|$))+)/gm, function (b) {
      var items = b.trim().split(/\r?\n/).map(function (l) {
        return '<li>' + renderInline(l.replace(/^[ \t]*-[ \t]+/, '')) + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });
    return src.split(/\r?\n\r?\n+/).map(function (b) {
      b = b.trim();
      if (!b) return '';
      if (/^<(h\d|ul|ol|table|p|section|div|pre|blockquote)/i.test(b)) return b;
      return '<p>' + renderInline(b) + '</p>';
    }).join('\n');
  }

  (function () {
    var status = document.getElementById('status');
    var root = document.getElementById('root');
    try {
      var raw = document.getElementById('md-source').textContent;
      var fm = raw.match(/^---\r?\n[\s\S]*?\r?\n---\r?\n/);
      var body = fm ? raw.slice(fm[0].length) : raw;
      var parts = body.split(/\r?\n---\r?\n/).map(function (s) { return s.trim(); }).filter(Boolean);
      parts.forEach(function (md) {
        var section = document.createElement('section');
        section.innerHTML = renderMd(md);
        root.appendChild(section);
      });
      status.textContent = '슬라이드 ' + parts.length + '장 · 한 페이지씩 스크롤';
    } catch (e) {
      status.textContent = '렌더 오류';
      root.innerHTML = '<pre style="color:#fff;background:#222;padding:30px;margin:30px;border-radius:8px;font-family:monospace;white-space:pre-wrap;">' + e.message + '</pre>';
    }
    document.getElementById('fullscreen').onclick = function (e) {
      e.preventDefault();
      document.documentElement.requestFullscreen().catch(function () {});
    };
    document.getElementById('print').onclick = function (e) {
      e.preventDefault();
      window.print();
    };
  })();
</script>
